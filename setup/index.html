<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uber Routes — Setup</title>
<style>
  body { font-family:-apple-system,Segoe UI,Roboto,sans-serif; max-width:480px; margin:0 auto; padding:16px; color:#1a1a1a; background:#fafafa; }
  h1 { font-size:20px; } h2 { font-size:16px; margin-top:24px; }
  .card { background:#fff; border:1px solid #e3e3e3; border-radius:10px; padding:14px; margin:10px 0; }
  label { display:block; font-size:12px; color:#666; margin:10px 0 4px; }
  input { width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; font-size:14px; box-sizing:border-box; }
  button { background:#000; color:#fff; border:0; padding:12px 16px; border-radius:8px; font-size:14px; margin-top:12px; cursor:pointer; }
  button.sec { background:#eee; color:#222; }
  button.small { padding:6px 10px; font-size:12px; margin:0 0 0 6px; }
  button.danger { background:#fdeaea; color:#b3261e; }
  .row { display:flex; gap:8px; }
  .row > div { flex:1; }
  .item { padding:10px; border-bottom:1px solid #eee; font-size:14px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .item .info { min-width:0; }
  .item small { color:#888; }
  .item .actions { flex-shrink:0; white-space:nowrap; }
  .status { font-size:13px; color:#555; min-height:18px; margin-top:8px; }
  code { background:#eee; padding:1px 5px; border-radius:4px; }
</style>
</head>
<body>
<h1>🚗 Uber Routes setup</h1>
<p style="font-size:13px;color:#666">Add the places your Rabbit R1 can summon rides for. Set your R1 creation's <code>BACKEND</code> to this page's URL. Data is stored on your backend server.</p>

<div id="cfg" class="status"></div>

<h2>Routes</h2>
<div class="card">
  <label id="routeFormLabel">Route name (e.g. "Work", "Home")</label>
  <input id="rName" placeholder="Work">
  <label>Aliases (comma-separated, optional — e.g. "House, Casa")</label>
  <input id="rAliases" placeholder="other names that should trigger this route">
  <label>Dropoff — address or place</label>
  <input id="rDrop" placeholder="1455 Market St, San Francisco, CA">
  <label>Pickup (leave blank = your current location)</label>
  <input id="rPick" placeholder="optional: 123 Maple St">
  <div class="row">
    <button id="rSaveBtn" onclick="saveRoute()">Save route</button>
    <button id="rCancelBtn" class="sec" onclick="cancelRouteEdit()" style="display:none">Cancel</button>
  </div>
</div>
<div id="routesList"></div>

<script>
var BACKEND = location.origin; // served by the same backend
function $(id){ return document.getElementById(id); }
var editingRouteId = null;

async function cfg(){
  try {
    await fetch(BACKEND + '/config');
    $('cfg').textContent = 'Backend: connected';
  } catch(e){ $('cfg').textContent = 'Cannot reach backend.'; }
}
async function refresh(){
  cfg();
  try {
    var d = await (await fetch(BACKEND + '/routes')).json();

    var rl = $('routesList'); rl.innerHTML = '';
    (d.routes||[]).forEach(function(r){
      var div = document.createElement('div'); div.className = 'item';
      var aliasTxt = (r.aliases && r.aliases.length) ? ' <small>(aka ' + esc(r.aliases.join(', ')) + ')</small>' : '';
      div.innerHTML = '<div class="info"><b>'+esc(r.name)+'</b>'+aliasTxt+'<br><small>'+esc(r.dropoff.addr||'')+'</small></div>';
      var actions = document.createElement('div'); actions.className = 'actions';
      var editBtn = document.createElement('button'); editBtn.className = 'sec small'; editBtn.textContent = 'Edit';
      editBtn.addEventListener('click', function(){ fillRouteForm(r); });
      var delBtn = document.createElement('button'); delBtn.className = 'danger small'; delBtn.textContent = 'Delete';
      delBtn.addEventListener('click', function(){ deleteRoute(r.id, r.name); });
      actions.appendChild(editBtn); actions.appendChild(delBtn);
      div.appendChild(actions);
      rl.appendChild(div);
    });
    if(!(d.routes||[]).length) rl.innerHTML = '<div class="status">No routes yet.</div>';
  } catch(e){}
}

function fillRouteForm(r){
  editingRouteId = r.id;
  $('rName').value = r.name;
  $('rAliases').value = (r.aliases||[]).join(', ');
  $('rDrop').value = r.dropoff.addr || '';
  $('rPick').value = (r.pickup && r.pickup.lat) ? (r.pickup.addr||'') : '';
  $('routeFormLabel').textContent = 'Editing "'+r.name+'"';
  $('rSaveBtn').textContent = 'Update route';
  $('rCancelBtn').style.display = 'inline-block';
  window.scrollTo(0,0);
}
function cancelRouteEdit(){
  editingRouteId = null;
  $('rName').value = $('rAliases').value = $('rDrop').value = $('rPick').value = '';
  $('routeFormLabel').textContent = 'Route name (e.g. "Work", "Home")';
  $('rSaveBtn').textContent = 'Save route';
  $('rCancelBtn').style.display = 'none';
}
async function saveRoute(){
  var name=$('rName').value.trim(), drop=$('rDrop').value.trim(), pick=$('rPick').value.trim();
  var aliases = $('rAliases').value.split(',').map(function(s){return s.trim();}).filter(Boolean);
  if(!name||!drop){ alert('Need a name and a dropoff.'); return; }
  var route = { name:name, aliases:aliases, dropoff:{}, pickup:{} };
  try {
    route.dropoff = await geocode(drop);
    route.pickup = pick ? await geocode(pick) : { lat:null, lng:null, addr:'my current location' };
  } catch(e){ alert('Could not geocode: '+e.message); return; }
  if(editingRouteId){
    await fetch(BACKEND+'/routes/'+encodeURIComponent(editingRouteId), {method:'PUT', headers:{'content-type':'application/json'}, body:JSON.stringify({route:route})});
  } else {
    await fetch(BACKEND+'/routes', {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({route:route})});
  }
  cancelRouteEdit();
  refresh();
}
async function deleteRoute(id, name){
  if(!confirm('Delete "'+name+'"?')) return;
  await fetch(BACKEND+'/routes/'+encodeURIComponent(id), {method:'DELETE'});
  refresh();
}

async function geocode(q){
  var r = await fetch(BACKEND + '/geocode?q=' + encodeURIComponent(q)); var j = await r.json();
  if(j.error) throw new Error(j.error);
  return { lat:j.lat, lng:j.lng, addr:(j.addr||q) };
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
refresh();
</script>
</body>
</html>
